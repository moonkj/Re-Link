name: re_link
description: "Re-Link — 가족 기억 저장소. 로컬 퍼스트, 기기에 저장하고 iCloud/Google Drive로 백업합니다."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── 상태 관리 (Riverpod 3.0) ──────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── 라우팅 ────────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── 로컬 DB (SQLite / Drift) ──────────────────────────────────────────────
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # ── 백업 — 압축 / 암호화 ──────────────────────────────────────────────────
  archive: ^4.0.4            # lottie ^3.3.1이 ^4.0.0 요구
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # ── 백업 — iCloud (iOS) ──────────────────────────────────────────────────
  icloud_storage: ^2.0.0

  # ── 백업 — Google Drive (Android) ────────────────────────────────────────
  googleapis: ^13.2.0
  google_sign_in: ^6.2.2
  http: ^1.2.2

  # ── 음성 ─────────────────────────────────────────────────────────────────
  record: ^6.2.0
  audio_waveforms: ^2.0.2

  # ── 이미지 ───────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # ── 광고 / 수익화 ─────────────────────────────────────────────────────────
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # ── 파일시스템 / 미디어 ───────────────────────────────────────────────────
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.6      # .rlink 파일 가져오기 (가족 공유)

  # ── 유틸리티 ──────────────────────────────────────────────────────────────
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # ── 아이콘 ────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── 코드 생성 ─────────────────────────────────────────────────────────────
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.14
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
