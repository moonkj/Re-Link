name: re_link
description: "Re-Link — 가족 기억 저장소. 노드 기반 가족 트리로 사진, 음성, AI 대화를 저장합니다."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ──────────────────────────────────────────────────────────────
  supabase_flutter: ^2.9.0

  # ── 상태 관리 (Riverpod 3.0) ──────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── 라우팅 ────────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── 캔버스 / 가족 트리 ────────────────────────────────────────────────────
  genealogy_chart: ^1.0.0
  infinite_canvas: ^0.0.10

  # ── 음성 ─────────────────────────────────────────────────────────────────
  record: ^6.2.0
  audio_waveforms: ^2.0.2
  just_audio: ^0.9.42

  # ── 이미지 ───────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # ── UI / 디자인 ───────────────────────────────────────────────────────────
  glassmorphism: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # ── 광고 / 수익화 ─────────────────────────────────────────────────────────
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # ── 로컬 저장 / 오프라인 ──────────────────────────────────────────────────
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # ── 네트워크 ──────────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.3
  http: ^1.2.2

  # ── 유틸리티 ──────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  package_info_plus: ^8.3.0
  device_info_plus: ^11.2.0
  collection: ^1.19.1
  equatable: ^2.0.7

  # ── 아이콘 ────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── 린트 ──────────────────────────────────────────────────────────────────
  flutter_lints: ^6.0.0

  # ── 코드 생성 ─────────────────────────────────────────────────────────────
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.14
  hive_ce_generator: ^1.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
